<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfera Interativa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="esfera" id="minhaEsfera"></div>

    <script>
        const esfera = document.getElementById('minhaEsfera');

        // Função para gerar uma cor hexadecimal aleatória
        const gerarCorAleatoria = () => {
            const letras = '0123456789ABCDEF';
            let cor = '#';
            for (let i = 0; i < 6; i++) {
                cor += letras[Math.floor(Math.random() * 16)];
            }
            return cor;
        };

        // Evento que muda a cor ao passar o mouse
        esfera.addEventListener('mouseenter', () => {
            const novaCor = gerarCorAleatoria();
            // Mantemos o gradiente radial para o efeito 3D
            esfera.style.background = `radial-gradient(circle at 65% 15%, ${novaCor}, #000)`;
        });
    </script>
</body>
</html>
